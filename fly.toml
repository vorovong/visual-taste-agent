app = "visual-taste-agent"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "vta_data"
  destination = "/app/data"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
